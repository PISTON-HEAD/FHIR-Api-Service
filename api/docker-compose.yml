version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fhir-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fhir_db
      MYSQL_USER: fhir_user
      MYSQL_PASSWORD: fhir_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - fhir-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql-data:
    driver: local

networks:
  fhir-network:
    driver: bridge
